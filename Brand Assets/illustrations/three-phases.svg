<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F2EA"/>
      <stop offset="100%" stop-color="#FDFAF5"/>
    </linearGradient>
    <linearGradient id="iconAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </linearGradient>
    <marker id="arrowPhase" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 Z" fill="#C8860A" opacity="0.8"/>
    </marker>
    <marker id="arrowWhite" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 Z" fill="#FDFAF5"/>
    </marker>
  </defs>
  <rect width="900" height="300" fill="#FDFAF5"/>
  <!-- Subtle baseline band -->
  <rect x="0" y="240" width="900" height="60" fill="#F7F2EA" opacity="0.4"/>

  <!-- PHASE 1 CARD -->
  <rect x="40" y="40" width="220" height="190" rx="14" fill="url(#cardGrad1)" stroke="#C8860A" stroke-width="1.5" opacity="0.95"/>
  <circle cx="150" cy="40" r="16" fill="#C8860A"/>
  <text x="150" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FDFAF5">1</text>
  <!-- Database icon -->
  <ellipse cx="150" cy="108" rx="36" ry="14" fill="url(#iconAmber)" opacity="0.9"/>
  <rect x="114" y="108" width="72" height="36" fill="#C8860A" opacity="0.75"/>
  <ellipse cx="150" cy="144" rx="36" ry="14" fill="#A84B28" opacity="0.8"/>
  <ellipse cx="150" cy="108" rx="36" ry="14" fill="none" stroke="#E8A020" stroke-width="1.5" opacity="0.5"/>
  <line x1="114" y1="120" x2="186" y2="120" stroke="#E8A020" stroke-width="1" opacity="0.3"/>
  <line x1="114" y1="132" x2="186" y2="132" stroke="#E8A020" stroke-width="1" opacity="0.2"/>
  <text x="150" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1A1814">Foundation</text>
  <text x="150" y="196" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B6560">Data Warehouse</text>
  <text x="150" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#B0AA9F" letter-spacing="1.2">PHASE 01</text>

  <!-- Arrow 1 to 2 -->
  <line x1="268" y1="135" x2="332" y2="135" stroke="#C8860A" stroke-width="2" marker-end="url(#arrowPhase)" opacity="0.75"/>
  <circle cx="300" cy="135" r="3" fill="#E8A020" opacity="0.7"/>

  <!-- PHASE 2 CARD -->
  <rect x="340" y="40" width="220" height="190" rx="14" fill="url(#cardGrad1)" stroke="#C8860A" stroke-width="2" opacity="1"/>
  <rect x="340" y="40" width="220" height="190" rx="14" fill="none" stroke="#E8A020" stroke-width="3.5" opacity="0.35"/>
  <circle cx="450" cy="40" r="16" fill="#C8860A"/>
  <text x="450" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FDFAF5">2</text>
  <!-- Transform icon: diamond -->
  <polygon points="450,88 486,118 450,148 414,118" fill="url(#iconAmber)" opacity="0.9"/>
  <polygon points="450,88 486,118 450,148 414,118" fill="none" stroke="#FDFAF5" stroke-width="1.5" opacity="0.4"/>
  <line x1="426" y1="118" x2="474" y2="118" stroke="#FDFAF5" stroke-width="2" marker-end="url(#arrowWhite)" opacity="0.7"/>
  <circle cx="426" cy="118" r="4" fill="#A84B28"/>
  <circle cx="474" cy="118" r="4" fill="#A84B28"/>
  <text x="450" y="176" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1A1814">Structure</text>
  <text x="450" y="194" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B6560">Model &amp; Transform</text>
  <text x="450" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#C8860A" letter-spacing="1.2" font-weight="600">PHASE 02</text>

  <!-- Arrow 2 to 3 -->
  <line x1="568" y1="135" x2="632" y2="135" stroke="#C8860A" stroke-width="2" marker-end="url(#arrowPhase)" opacity="0.75"/>
  <circle cx="600" cy="135" r="3" fill="#E8A020" opacity="0.7"/>

  <!-- PHASE 3 CARD -->
  <rect x="640" y="40" width="220" height="190" rx="14" fill="url(#cardGrad1)" stroke="#C8860A" stroke-width="1.5" opacity="0.95"/>
  <circle cx="750" cy="40" r="16" fill="#A84B28"/>
  <text x="750" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FDFAF5">3</text>
  <!-- Chat/query icon -->
  <path d="M718,96 Q718,84 750,84 Q782,84 782,96 L782,130 Q782,142 750,142 L730,142 L720,154 L724,142 Q718,142 718,130 Z" fill="url(#iconAmber)" opacity="0.85"/>
  <line x1="732" y1="104" x2="768" y2="104" stroke="#FDFAF5" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="732" y1="114" x2="760" y2="114" stroke="#FDFAF5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="732" y1="124" x2="752" y2="124" stroke="#FDFAF5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <rect x="754" y="120" width="4" height="9" rx="1" fill="#E8A020" opacity="0.8"/>
  <text x="750" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1A1814">AI Agents</text>
  <text x="750" y="196" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B6560">Natural Language Query</text>
  <text x="750" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#A84B28" letter-spacing="1.2" font-weight="600">PHASE 03</text>

  <!-- Bottom subtitle -->
  <text x="450" y="278" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#B0AA9F" letter-spacing="1">THE SAUZI FRAMEWORK</text>
</svg>
